<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>学生信息管理系统</h1>
        </header>

        <nav>
            <button class="nav-btn active" onclick="showSection('students')">学生管理</button>
            <button class="nav-btn" onclick="showSection('scores')">成绩管理</button>
        </nav>

        <!-- 学生管理部分 -->
        <section id="students-section" class="section">
            <div class="form-container">
                <h2>添加学生</h2>
                <form id="add-student-form">
                    <div class="form-group">
                        <label for="student-name">姓名:</label>
                        <input type="text" id="student-name" required>
                    </div>
                    <div class="form-group">
                        <label for="student-class">班级:</label>
                        <input type="text" id="student-class" required>
                    </div>
                    <button type="submit" class="btn btn-primary">添加学生</button>
                </form>
            </div>

            <div class="form-container">
                <h2>查询学生</h2>
                <form id="search-student-form">
                    <div class="form-group">
                        <label for="search-student-id">学生ID:</label>
                        <input type="number" id="search-student-id" required>
                    </div>
                    <button type="submit" class="btn btn-primary">查询学生</button>
                </form>
                <div id="student-info" class="info-display"></div>
            </div>

            <div class="form-container">
                <h2>修改学生</h2>
                <form id="update-student-form">
                    <div class="form-group">
                        <label for="update-student-id">学生ID:</label>
                        <input type="number" id="update-student-id" required>
                    </div>
                    <div class="form-group">
                        <label for="update-name">姓名:</label>
                        <input type="text" id="update-name" required>
                    </div>
                    <div class="form-group">
                        <label for="update-class">班级:</label>
                        <input type="text" id="update-class" required>
                    </div>
                    <button type="submit" class="btn btn-success">修改学生</button>
                </form>
            </div>

            <div class="form-container">
                <h2>删除学生</h2>
                <form id="delete-student-form">
                    <div class="form-group">
                        <label for="delete-student-id">学生ID:</label>
                        <input type="number" id="delete-student-id" required>
                    </div>
                    <button type="submit" class="btn btn-danger">删除学生</button>
                </form>
            </div>
        </section>

        <!-- 成绩管理部分 -->
        <section id="scores-section" class="section" style="display: none;">
            <div class="form-container">
                <h2>录入成绩</h2>
                <form id="add-score-form">
                    <div class="form-group">
                        <label for="score-student-id">学生ID:</label>
                        <input type="number" id="score-student-id" required>
                    </div>
                    <div class="form-group">
                        <label for="score-subject">科目:</label>
                        <input type="text" id="score-subject" required>
                    </div>
                    <div class="form-group">
                        <label for="score-value">分数:</label>
                        <input type="number" id="score-value" required>
                    </div>
                    <button type="submit" class="btn btn-primary">录入成绩</button>
                </form>
            </div>

            <div class="form-container">
                <h2>查询成绩</h2>
                <form id="search-score-form">
                    <div class="form-group">
                        <label for="search-score-student-id">学生ID:</label>
                        <input type="number" id="search-score-student-id" required>
                    </div>
                    <button type="submit" class="btn btn-primary">查询成绩</button>
                </form>
                <div id="score-info" class="info-display"></div>
            </div>

            <div class="form-container">
                <h2>成绩平均分</h2>
                <form id="avg-score-form">
                    <div class="form-group">
                        <label for="avg-student-id">学生ID:</label>
                        <input type="number" id="avg-student-id" required>
                    </div>
                    <button type="submit" class="btn btn-primary">计算平均分</button>
                </form>
                <div id="avg-info" class="info-display"></div>
            </div>
        </section>

        <div id="message" class="message"></div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
